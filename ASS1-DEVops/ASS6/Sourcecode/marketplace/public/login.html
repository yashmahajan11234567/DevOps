<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo"><a href="/">Marketplace</a></div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="/login.html" class="nav-link active">Login</a></li>
        <li class="nav-item"><a href="/register.html" class="nav-link">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <div class="form-container">
        <h1>Login</h1>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
          </div>

          <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div id="message" class="message"></div>

        <p class="form-footer">Don't have an account? <a href="/register.html">Register here</a></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Used Vehicle Marketplace.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (response.ok) {
          messageDiv.textContent = 'Login successful! Redirecting...';
          messageDiv.className = 'message success';
          setTimeout(() => { window.location.href = '/'; }, 1500);
        } else {
          messageDiv.textContent = data.error || 'Login failed';
          messageDiv.className = 'message error';
        }
      } catch (error) {
        console.error('Error:', error);
        messageDiv.textContent = 'An error occurred. Please try again.';
        messageDiv.className = 'message error';
      }
    });
  </script>
</body>
</html>
