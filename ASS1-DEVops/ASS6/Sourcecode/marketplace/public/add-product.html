<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Vehicle - Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="/">Marketplace</a>
      </div>
      <ul class="nav-menu" id="navMenu">
        <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
        <li class="nav-item" id="addProductNav" style="display: none;"><a href="/add-product.html" class="nav-link active">Add Listing</a></li>
        <li class="nav-item" id="authNav"><a href="/login.html" class="nav-link">Login/Register</a></li>
        <li class="nav-item" id="logoutNav" style="display: none;"><a href="#" class="nav-link" onclick="logout(event)">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <div class="form-container">
        <h1>Add a Vehicle Listing</h1>

        <div id="notLoggedIn" class="alert alert-warning" style="display: none;">
          You must be <a href="/login.html">logged in</a> to add listings.
        </div>

        <form id="addProductForm">
          <div class="form-group">
            <label for="title">Listing Title:</label>
            <input type="text" id="title" name="title" required placeholder="e.g., Honda City ZX - First Owner">
          </div>

          <div class="form-group">
            <label for="category">Category:</label>
            <select id="category" name="category" required>
              <option value="">Select Category</option>
              <option value="car">Car</option>
              <option value="bike">Bike</option>
              <option value="scooter">Scooter</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="brand">Brand:</label>
            <input type="text" id="brand" name="brand" required placeholder="e.g., Honda">
          </div>

          <div class="form-group">
            <label for="model">Model:</label>
            <input type="text" id="model" name="model" required placeholder="e.g., City ZX">
          </div>

          <div class="form-group">
            <label for="year">Manufacturing Year:</label>
            <input type="number" id="year" name="year" placeholder="e.g., 2020" min="1980" max="2100">
          </div>

          <div class="form-group">
            <label for="kilometersDriven">Kilometers Driven:</label>
            <input type="number" id="kilometersDriven" name="kilometersDriven" placeholder="e.g., 35000" min="0">
          </div>

          <div class="form-group">
            <label for="fuelType">Fuel Type:</label>
            <input type="text" id="fuelType" name="fuelType" placeholder="e.g., Petrol / Diesel / EV">
          </div>

          <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" required placeholder="e.g., Pune">
          </div>

          <div class="form-group">
            <label for="price">Price (INR):</label>
            <input type="number" id="price" name="price" required placeholder="e.g., 585000" step="0.01" min="0">
          </div>

          <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" required placeholder="Describe condition, ownership, service history, accessories..." rows="5"></textarea>
          </div>

          <div class="form-group">
            <label for="imageUrl">Image URL:</label>
            <input type="url" id="imageUrl" name="imageUrl" required placeholder="https://example.com/image.jpg">
            <small>Enter a public image URL for the vehicle</small>
          </div>

          <button type="submit" class="btn btn-primary">Add Listing</button>
          <a href="/" class="btn btn-secondary">Cancel</a>
        </form>

        <div id="message" class="message"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Used Vehicle Marketplace.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuthStatus();
      if (!isUserLoggedIn) {
        document.getElementById('addProductForm').style.display = 'none';
        document.getElementById('notLoggedIn').style.display = 'block';
      }
    });

    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        title: document.getElementById('title').value,
        category: document.getElementById('category').value,
        brand: document.getElementById('brand').value,
        model: document.getElementById('model').value,
        year: document.getElementById('year').value,
        kilometersDriven: document.getElementById('kilometersDriven').value,
        fuelType: document.getElementById('fuelType').value,
        location: document.getElementById('location').value,
        price: document.getElementById('price').value,
        description: document.getElementById('description').value,
        imageUrl: document.getElementById('imageUrl').value
      };

      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.textContent = 'Listing added successfully! Redirecting...';
          messageDiv.className = 'message success';
          setTimeout(() => { window.location.href = '/'; }, 1500);
        } else {
          messageDiv.textContent = data.error || 'Failed to add listing';
          messageDiv.className = 'message error';
        }
      } catch (error) {
        console.error('Error:', error);
        messageDiv.textContent = 'An error occurred. Please try again.';
        messageDiv.className = 'message error';
      }
    });
  </script>
</body>
</html>
