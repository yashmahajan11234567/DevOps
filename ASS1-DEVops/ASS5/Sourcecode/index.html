<!DOCTYPE html>
<html>
<head>

<title>Event Attendance</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  padding: 30px;
}

.container {
  display: flex;
  gap: 20px;
  max-width: 100%;
  height: 100vh;
  margin: 0 auto;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}

.card{
  background: white;
  width: 95vw;
  height: 90vh;
  padding: 80px;
  border-radius: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: left;
  animation: slideUp 0.6s ease-out;
  backdrop-filter: blur(10px);
  overflow-y: auto;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card h2{
  margin-bottom: 30px;
  font-size: 48px;
  background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.form-group {
  margin-bottom: 30px;
}

.form-group label {
  display: block;
  margin-bottom: 12px;
  font-weight: 600;
  color: #333;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input, select {
  width: 100%;
  padding: 25px;
  border-radius: 10px;
  border: 2px solid #e0e0e0;
font-size: 22px;
  transition: all 0.3s ease;
  font-family: inherit;
}

input:focus, select:focus{
  outline: none;
  border-color: #06B6D4;
  box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
}

input::placeholder {
  color: #999;
}

button{
  width: 100%;
  padding: 20px;
  margin-top: 30px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
  color: white;
  font-size: 20px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
}

button:active {
  transform: translateY(0);
}

.details-card {
  background: white;
  width: 700px;
  padding: 50px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: slideUp 0.6s ease-out;
  max-height: 700px;
  overflow-y: auto;
}

.details-card h2 {
  font-size: 28px;
  background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 30px;
}

.event-item {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  border-left: 5px solid #06B6D4;
  transition: all 0.3s ease;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

.event-item:hover {
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  transform: translateX(5px);
}

.event-item p {
  margin: 10px 0;
  color: #333;
  font-size: 15px;
}

.event-item strong {
  color: #06B6D4;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.5px;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: #999;
}

.empty-state p {
  font-size: 16px;
}

.tab-buttons {
  display: none;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.tab-btn {
  flex: 1;
  min-width: 120px;
  padding: 12px 20px;
  border: 2px solid #e0e0e0;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
  text-transform: uppercase;
  font-size: 14px;
  letter-spacing: 0.5px;
}

.tab-btn.active {
  background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
  color: white;
  border-color: #06B6D4;
}

.tab-btn:hover {
  border-color: #06B6D4;
}

@media (max-width: 1200px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .card, .details-card {
    width: 100%;
    max-width: 500px;
  }
}

.success-message {
  background: #10b981;
  color: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.error-message {
  background: #ef4444;
  color: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  animation: slideDown 0.3s ease-out;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel" src="app.js"></script>

</body>
</html>
